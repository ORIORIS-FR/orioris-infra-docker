networks:
  bunker_net:
    driver: bridge

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_bunker
    restart: unless-stopped
    ports: ["5678:5678"]
    environment:
      - N8N_HOST=${N8N_HOST}
      - WEBHOOK_URL=http://${N8N_HOST}:5678/
      - GENERIC_TIMEZONE=${TZ}
      - N8N_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - N8N_GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NODES_EXCLUDE="[]"
      - N8N_SECURE_COOKIE=false
      - N8N_FS_ALLOWED_PATHS=/data_rag_test
    volumes:
      - n8n_data:/home/node/.n8n
      - "${PATH_OBSIDIAN}:/vault"
      - ./RAG_TEST:/home/node/.n8n-files
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks:
      - bunker_net

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm_bunker
    ports: ["4000:4000"] 
    volumes:
      - ./litellm_config/litellm-config.yaml:/app/config.yaml
    env_file: .env
    restart: always
    command: [ "--config", "/app/config.yaml", "--port", "4000", "--detailed_debug" ]
    networks:
      - bunker_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tunnel_bunker:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_bunker
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    command: tunnel run
    networks:
      - bunker_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_bunker
    restart: unless-stopped
    ports: ["6333:6333"]
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - bunker_net

  searxng:
    image: searxng/searxng:latest
    container_name: searxng_bunker
    ports: ["8888:8080"]
    volumes:
      - ./searxng_config:/etc/searxng
    networks:
      - bunker_net

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale_bunker
    hostname: gateway-bunker
    network_mode: host
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY} 
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ./tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

  open_webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open_webui_bunker
    restart: unless-stopped
    ports:
      - "3001:8080"
    volumes:
      - ./open_webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_BASE_URL=http://litellm_bunker:4000/v1
      - OPENAI_API_KEY=sk-fucking-hole
      - WEBUI_AUTH=True
    networks:
      - bunker_net

volumes:
  n8n_data:
    external: true
  linkding_data: {}
